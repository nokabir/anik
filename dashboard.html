<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Ludo Tournament</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Ludo Tournament</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="game.html">Play Game</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="index.html" id="logout-link">Logout</a>
        </nav>
    </header>

    <main>
        <h1>Your Dashboard</h1>

        <section id="user-profile">
            <h2>User Profile</h2>
            <p><strong>Username:</strong> [Username]</p>
            <p><strong>Email:</strong> [Email]</p>
        </section>

        <section id="wallet">
            <h2>Wallet</h2>
            <p><strong>Balance:</strong> $1,000.00</p>
            <button>Deposit</button>
            <button>Withdraw</button>
        </section>

        <section id="game-history">
            <h2>Game History</h2>
            <p>No games played yet.</p>
        </section>

    </main>

    <footer>
        <p>&copy; 2024 Ludo Tournament. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
